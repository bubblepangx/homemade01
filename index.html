<script>
const cv=document.getElementById('gc'),X=cv.getContext('2d');
X.imageSmoothingEnabled=false;
const W=800,H=480,T=32,GY=13*T;
let tNow=0;

// ═══ AUDIO ═══
let AC=null,audioUnlocked=false;
function uAC(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}if(AC&&AC.state==='suspended')AC.resume().catch(()=>{});if(AC&&!audioUnlocked){try{const b=AC.createBuffer(1,1,22050),s=AC.createBufferSource();s.buffer=b;s.connect(AC.destination);s.start(0);audioUnlocked=true;}catch(e){}}return AC;}
function bip(f,d,v=0.09,tp='square',at=0){const ac=uAC();if(!ac||ac.state==='suspended')return;const now=ac.currentTime+(at||0);const o=ac.createOscillator(),g=ac.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(v,now);g.gain.exponentialRampToValueAtTime(0.001,now+Math.max(d,0.05));o.connect(g);g.connect(ac.destination);o.start(now);o.stop(now+d+0.01);}
const SFX={
  jump:()=>{bip(330,0.06,0.08);bip(440,0.10,0.07,'square',0.05);},
  coin:()=>{bip(800,0.04,0.12);bip(1047,0.14,0.10,'square',0.04);},
  stomp:()=>{bip(140,0.12,0.16,'sawtooth');},
  die:()=>{stopBGM();[392,330,294,247,220,196].forEach((f,i)=>bip(f,0.1,0.11,'square',i*0.12));},
  shroom:()=>{[262,330,392,523,659,784].forEach((f,i)=>bip(f,0.07,0.10,'square',i*0.055));},
  star:()=>{[523,659,784,988,1047,1319,1568].forEach((f,i)=>bip(f,0.06,0.10,'square',i*0.045));},
  pipe:()=>{for(let i=0;i<6;i++)bip(230-i*20,0.08,0.06,'sawtooth',i*0.04);},
  bump:()=>{bip(200,0.05,0.12);bip(150,0.03,0.06,'square',0.04);},
  flag:()=>{stopBGM();[523,659,784,988,1047,1319].forEach((f,i)=>bip(f,0.14,0.10,'square',i*0.13));},
  clear:()=>{[[523,.14],[659,.14],[784,.14],[1047,.18],[784,.09],[1047,.32]].reduce((t,[f,d])=>{bip(f,d,0.10,'square',t);return t+d;},0);},
  hurt:()=>{stopBGM();bip(392,0.1,0.16);bip(330,0.1,0.16,'square',0.1);bip(220,0.18,0.16,'square',0.2);},

  victory:()=>{stopBGM();const m=[[523,.2],[659,.2],[784,.2],[1047,.3],[784,.15],[1047,.4],[1319,.5]];let t=0;m.forEach(([f,d])=>{bip(f,d,0.12,'square',t);t+=d;});},
};

let bgmId=null,bgmOscs=[],bgmTout=null;
function stopBGM(){bgmId=null;bgmOscs.forEach(o=>{try{o.stop(0)}catch(e){}});bgmOscs=[];if(bgmTout){clearTimeout(bgmTout);bgmTout=null;}}
const N={C3:131,D3:147,E3:165,F3:175,G3:196,A3:220,Bb3:233,B3:247,C4:262,D4:294,Eb4:311,E4:330,F4:349,Fs4:370,G4:392,Ab4:415,A4:440,Bb4:466,B4:494,C5:523,D5:587,Eb5:622,E5:659,F5:698,Fs5:740,G5:784,A5:880,B5:988,C6:1047,_:0};

function playBGM(id,seq,bpm,wave,vol){
  if(bgmId===id)return;stopBGM();bgmId=id;const ac=uAC();if(!ac)return;
  const B=60/bpm,E=B/2,S=B/4;
  function sched(){if(bgmId!==id)return;let when=0;const nos=[];
    seq(B,E,S).forEach(([fr,dur])=>{if(fr>0){const t=ac.currentTime+when;const o=ac.createOscillator(),g=ac.createGain();o.type=wave;o.frequency.value=fr;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.8);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+dur);nos.push(o);}when+=dur;});
    bgmOscs=nos;bgmTout=setTimeout(()=>{bgmOscs=[];sched();},when*1000-120);}
  sched();
}

  forest:{s:(B,E,S)=>[[N.C5,E],[N.E5,E],[N.G5,E],[N.C6,B],[N._,E],[N.B5,E],[N.G5,E],[N.E5,B],[N._,E],[N.A4,E],[N.C5,E],[N.E5,E],[N.A5,B],[N.G5,E],[N.E5,E],[N.F5,B],[N.E5,E],[N.D5,E],[N.C5,B],[N._,E],[N.G5,B],[N.E5,B],[N.C5,B+E],[N._,B]],b:200,w:'square',v:0.045},

  candy:{s:(B,E,S)=>[[N.C5,S],[N.E5,S],[N.G5,S],[N.C6,S],[N._,S],[N.B5,S],[N.G5,S],[N.E5,S],[N.C5,B],[N._,E],[N.D5,S],[N.F5,S],[N.A5,S],[N.C6,S],[N._,S],[N.A5,S],[N.F5,S],[N.D5,S],[N.G5,B],[N._,E],[N.E5,B],[N.C5,B+E],[N._,B]],b:230,w:'square',v:0.042},
  toy:{s:(B,E,S)=>[[N.G5,S],[N._,S],[N.G5,S],[N._,S],[N.A5,E],[N.G5,E],[N.E5,E],[N.C5,E],[N._,E],[N.D5,E],[N.E5,E],[N.G5,B],[N._,E],[N.C5,E],[N.D5,E],[N.E5,E],[N.G5,E],[N.A5,B],[N.G5,B],[N.E5,B],[N.C5,B+E],[N._,B]],b:210,w:'square',v:0.045},
  boss:{s:(B,E,S)=>[[N.E4,E],[N._,S],[N.E4,S],[N.G4,E],[N.E4,E],[N.C4,E],[N.D4,E],[N._,S],[N.D4,S],[N.E4,E],[N.C4,E],[N.A3,E],[N.E4,E],[N._,S],[N.E4,S],[N.G4,E],[N.A4,E],[N.G4,E],[N.E4,E],[N.C4,B],[N._,B]],b:180,w:'sawtooth',v:0.038},
};

function startBGM(id){const b=BGMS[id];if(b)playBGM(id,b.s,b.b,b.w,b.v);}

// ═══ THEMES ═══
const TH={
  ow:{sky:'#5C94FC',gB:'#C84000',gT:'#E86800',gD:'#A03000',pA:'#00CC00',pB:'#008800',pC:'#005500',cl:1,hl:1},

  castle:{sky:'#1A0A00',gB:'#484848',gT:'#606060',gD:'#303030',pA:'#888',pB:'#666',pC:'#444',lv:1},

  desert:{sky:'#F4A460',gB:'#DEB887',gT:'#F5DEB3',gD:'#C8A060',pA:'#C0C000',pB:'#808000',pC:'#606000',cl:1,hl:1},
  snow:{sky:'#B0D4F1',gB:'#E0E0F0',gT:'#FFF',gD:'#C0C8D0',pA:'#80C0E0',pB:'#5090B0',pC:'#306080',cl:1,hl:1,sn:1},

  forest:{sky:'#2D5A27',gB:'#5A3A1A',gT:'#6B4A2A',gD:'#3A2A0A',pA:'#227722',pB:'#115511',pC:'#003300',tr:1},

};
const TN={ow:'Grassland',ug:'Underground',castle:'Castle',sky:'Sky World',desert:'Desert',snow:'Snow Land',night:'Night World',forest:'Dark Forest',volcano:'Volcano',beach:'Beach',sunset:'Sunset Hill',haunted:'Ghost House',underwater:'Underwater',candy:'Candy Land',toy:'Toy Land',boss:'Bowser Castle'};

// ═══ 3D-STYLE DRAWING FUNCTIONS ═══
function drawBrick3D(sx,sy){
  const th=gTH();const dk=(th===TH.ug||th===TH.castle||th===TH.volcano||th===TH.boss||th===TH.haunted);
  const base=dk?'#505050':'#C84010',hi=dk?'#707070':'#E86828',lo=dk?'#383838':'#903008',line=dk?'#303030':'#7A2808';
  // Main face
  X.fillStyle=base;X.fillRect(sx+1,sy+1,T-2,T-2);
  // Highlight top-left
  X.fillStyle=hi;X.fillRect(sx+1,sy+1,T-2,3);X.fillRect(sx+1,sy+1,3,T-2);
  // Shadow bottom-right
  X.fillStyle=lo;X.fillRect(sx+1,sy+T-4,T-2,3);X.fillRect(sx+T-4,sy+1,3,T-2);
  // Mortar lines
  X.fillStyle=line;
  X.fillRect(sx,sy+T/2-1,T,2);
  X.fillRect(sx+T/2-1,sy,2,T/2-1);
  X.fillRect(sx+T/4-1,sy+T/2+1,2,T/2-1);
  X.fillRect(sx+T*3/4-1,sy+T/2+1,2,T/2-1);
}

function drawQBlk3D(sx,sy,used,bounce){
  const oy=bounce>5?-4:0;
  if(used){
    X.fillStyle='#706050';X.fillRect(sx+1,sy+oy+1,T-2,T-2);
    X.fillStyle='#605040';X.fillRect(sx+1,sy+oy+T-4,T-2,3);X.fillRect(sx+T-4,sy+oy+1,3,T-2);
    X.fillStyle='#807060';X.fillRect(sx+1,sy+oy+1,T-2,2);X.fillRect(sx+1,sy+oy+1,2,T-2);
  } else {
    // Animated shimmer
    const shimmer=Math.sin(tNow/200)*0.15;
    X.fillStyle=`rgb(${248+shimmer*20|0},${168+shimmer*20|0},0)`;
    X.fillRect(sx+1,sy+oy+1,T-2,T-2);
    // 3D edges
    X.fillStyle='#FFD040';X.fillRect(sx+1,sy+oy+1,T-2,3);X.fillRect(sx+1,sy+oy+1,3,T-2);
    X.fillStyle='#C07000';X.fillRect(sx+1,sy+oy+T-4,T-2,3);X.fillRect(sx+T-4,sy+oy+1,3,T-2);
    // Rivets
    X.fillStyle='#B06800';
    X.fillRect(sx+4,sy+oy+4,3,3);X.fillRect(sx+T-7,sy+oy+4,3,3);
    X.fillRect(sx+4,sy+oy+T-7,3,3);X.fillRect(sx+T-7,sy+oy+T-7,3,3);
    // Question mark with shadow
    X.fillStyle='rgba(0,0,0,0.3)';X.font='bold 20px monospace';X.textAlign='center';X.textBaseline='middle';
    X.fillText('?',sx+T/2+1,sy+oy+T/2+2);
    X.fillStyle='#FFF';X.fillText('?',sx+T/2,sy+oy+T/2+1);
  }
}

function drawPipe3D(sx,sy,pw,ph){
  const th=gTH();
  // Pipe body
  const grd=X.createLinearGradient(sx,0,sx+pw,0);
  grd.addColorStop(0,th.pC);grd.addColorStop(0.2,th.pA);grd.addColorStop(0.5,th.pB);grd.addColorStop(0.8,th.pA);grd.addColorStop(1,th.pC);
  X.fillStyle=grd;X.fillRect(sx+4,sy+T,pw-8,ph-T);
  // Highlight stripe

// Precompute lighter/darker variants for 3D shading
const _shadeCache={};
function _lighter(hex,amt){const k='l'+amt+hex;if(_shadeCache[k])return _shadeCache[k];const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const v='#'+[r,g,b].map(c=>Math.min(255,c+amt|0).toString(16).padStart(2,'0')).join('');_shadeCache[k]=v;return v;}
function _darker(hex,amt){const k='d'+amt+hex;if(_shadeCache[k])return _shadeCache[k];const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const v='#'+[r,g,b].map(c=>Math.max(0,c-amt|0).toString(16).padStart(2,'0')).join('');_shadeCache[k]=v;return v;}

function drawPM(px,py,sprite,w,h,flip,white){
  X.save();
  if(flip){X.translate(Math.round(px)+w,Math.round(py));X.scale(-1,1);}
  else X.translate(Math.round(px),Math.round(py));
  const rows=sprite.length,cols=16,cw=w/cols,ch=h/rows;
  const pal=white?MC_W:MC2;
  // Pass 1: main fill + 3D bevel per pixel
  for(let r=0;r<rows;r++){
    for(let cl=0;cl<cols;cl++){
      const ch2=sprite[r][cl];if(ch2==='0')continue;
      const color=pal[ch2];if(!color)continue;
      const cx=Math.floor(cl*cw),cy=Math.floor(r*ch);
      const pw=Math.ceil(cw)+0.5,ph=Math.ceil(ch)+0.5;
      // Main pixel
      X.fillStyle=color;
      X.fillRect(cx,cy,pw,ph);
      // Top highlight (check if pixel above is empty)
      const above=r>0?sprite[r-1][cl]:'0';
      if(above==='0'){
        X.fillStyle=_lighter(color,55);
        X.fillRect(cx,cy,pw,Math.max(1,ph*0.3));
      }
      // Left highlight
      const left=cl>0?sprite[r][cl-1]:'0';
      if(left==='0'){
        X.fillStyle=_lighter(color,35);
        X.fillRect(cx,cy,Math.max(1,pw*0.25),ph);
      }
      // Bottom shadow
      const below=r<rows-1?sprite[r+1][cl]:'0';
      if(below==='0'){
        X.fillStyle=_darker(color,50);
        X.fillRect(cx,cy+ph-Math.max(1,ph*0.3),pw,Math.max(1,ph*0.3));
      }
      // Right shadow
      const right=cl<cols-1?sprite[r][cl+1]:'0';
      if(right==='0'){
        X.fillStyle=_darker(color,35);
        X.fillRect(cx+pw-Math.max(1,pw*0.25),cy,Math.max(1,pw*0.25),ph);
      }
    }
  }
  // Pass 2: subtle dark outline around sprite silhouette
  X.fillStyle='rgba(0,0,0,0.18)';
  for(let r=0;r<rows;r++){
    for(let cl=0;cl<cols;cl++){
      if(sprite[r][cl]==='0')continue;
      const cx=Math.floor(cl*cw),cy=Math.floor(r*ch);
      const pw=Math.ceil(cw)+0.5,ph=Math.ceil(ch)+0.5;
      // Only draw outline on edges adjacent to transparent
      if(r===0||sprite[r-1][cl]==='0')X.fillRect(cx,cy-0.5,pw,1);
      if(r===rows-1||sprite[r+1][cl]==='0')X.fillRect(cx,cy+ph-0.5,pw,1);
      if(cl===0||sprite[r][cl-1]==='0')X.fillRect(cx-0.5,cy,1,ph);
      if(cl===cols-1||sprite[r][cl+1]==='0')X.fillRect(cx+pw-0.5,cy,1,ph);
    }
  }
  X.restore();
}

  ld.pipes.forEach(p=>{const ph=p.rows*T,py=GY-ph;const po={x:p.x,y:py,w:T*2,h:ph+T,t:'PIPE',sec:!!p.sec};pipeObjs.push(po);solids.push(po);});
  if(ld.stairs){const{x:sx,n}=ld.stairs;for(let i=0;i<n;i++)for(let j=i;j<n;j++)solids.push({x:sx+i*T,y:GY-(j+1)*T,w:T,h:T,t:'S'});}
  const espd=ld.espd||1.3;
  ld.enemies.forEach(e=>{const et=e.t||'g';enemies.push({x:e.x,y:GY-T,vx:-(espd)*(et==='sp'?1.2:1),vy:0,w:30,h:30,gnd:false,stomped:false,stT:0,dead:false,aF:0,aT:0,type:et,jumpT:0});});
  ld.fcoins&&ld.fcoins.forEach(fc=>worldCoins.push({x:fc.x,y:fc.y,w:14,h:22,got:false}));
  if(ld.flagX)poleObj={x:ld.flagX,topY:T*2,flagY:T*2};

  // Boss
  if(ld.boss){
    bossObj={x:(ld.LW/T-20)*T,y:GY-T*3,w:T*2,h:T*3-4,hp:5,vx:-1.5,vy:0,gnd:false,hit:0,dead:false,aT:0,fireT:0};
  }

  const th=TH[ld.theme];
  if(th.sn)for(let i=0;i<60;i++)envP.push({t:'sn',x:Math.random()*W*3,y:Math.random()*H,s:1+Math.random()*2,vx:-0.3+Math.random()*0.6,vy:0.5+Math.random()*1.5});
  if(th.fg)for(let i=0;i<15;i++)envP.push({t:'fg',x:Math.random()*W*4,y:H*0.5+Math.random()*H*0.35,s:30+Math.random()*50,vx:0.15+Math.random()*0.25,a:0.08+Math.random()*0.12});
  if(th.uw)for(let i=0;i<30;i++)envP.push({t:'ub',x:Math.random()*W*3,y:Math.random()*H,s:2+Math.random()*4,vy:-0.3-Math.random()*0.5});
  if(th.cd)for(let i=0;i<25;i++)envP.push({t:'cd',x:Math.random()*W*3,y:Math.random()*H,s:3+Math.random()*5,vy:0.2+Math.random()*0.4,c:['#FF69B4','#FFD700','#87CEEB','#98FB98','#DDA0DD'][Math.floor(Math.random()*5)]});
  if(th.ty)for(let i=0;i<20;i++)envP.push({t:'ty',x:Math.random()*W*3,y:50+Math.random()*200,s:8+Math.random()*12,sp:0.5+Math.random(),c:['#FF4444','#4444FF','#FFFF44','#44FF44'][Math.floor(Math.random()*4)]});

  G.lv=li;
}

function enterSub(px){uAC();SFX.pipe();subEnterX=px;inSub=true;G.state='sub';subTimer=0;const sd=LEVELS[G.lv].sub,sw=sd.W;subSolids=[];subCoins=[];subQB=[];subSolids.push({x:0,y:GY,w:sw,h:H-GY,t:'GND'});subSolids.push({x:0,y:0,w:sw,h:T,t:'CEIL'});subSolids.push({x:-T,y:0,w:T,h:H,t:'WALL'});subSolids.push({x:sw,y:0,w:T,h:H,t:'WALL'});subSolids.push({x:sd.exitX,y:GY-3*T,w:T*2,h:3*T+2,t:'PIPE_EX'});sd.qbs&&sd.qbs.forEach(b=>subQB.push({x:b.x,y:b.y,w:T,h:T,t:'Q',it:b.it,used:false,bY:b.y,bounce:0}));sd.coins&&sd.coins.forEach(co=>subCoins.push({x:co.x,y:co.y,w:14,h:22,got:false}));initP(T*2,GY-37);G.camX=0;setTimeout(()=>startBGM('ug'),200);}
function exitSub(){inSub=false;G.state='play';SFX.pipe();buildLevel(G.lv);initP(subEnterX+T*2.5,GY-37);G.camX=Math.max(0,subEnterX-W*0.4);setTimeout(()=>startBGM(LEVELS[G.lv].theme),200);}

// ═══ PHYSICS ═══
function ov(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function gS(fp){return inSub?(fp?[...subSolids,...subQB]:subSolids):solids;}
function gTH(){return inSub?TH.ug:TH[LEVELS[G.lv].theme];}

function moveY(obj,sl){obj.y+=obj.vy;let gnd=false,hitTop=null;for(const s of sl){if(s.t==='WALL'||(s.t==='CEIL'&&obj.type))continue;if(!ov(obj.x,obj.y,obj.w,obj.h,s.x,s.y,s.w,s.h))continue;if(obj.vy>=0){obj.y=s.y-obj.h;obj.vy=0;gnd=true;}else{obj.y=s.y+s.h;hitTop=s;obj.vy=0;}break;}return{gnd,hitTop};}
function moveX(obj,sl){obj.x+=obj.vx;for(const s of sl){if(!ov(obj.x,obj.y,obj.w,obj.h,s.x,s.y,s.w,s.h))continue;if(obj.vx>0)obj.x=s.x-obj.w;else if(obj.vx<0)obj.x=s.x+s.w;return true;}return false;}

function hitBlock(blk){
  if(blk.used||blk.t==='USED'||blk.t==='S'||blk.t==='GND')return;
  if(blk.t==='Q'){blk.used=true;blk.bounce=10;
    if(blk.it==='C'){addScore(200);addCoin();SFX.coin();spawnPart(blk.x+T/2,blk.y,'coin');}
    else if(blk.it==='M'){mushrooms.push({x:blk.x,y:blk.y-T,vx:1.5,vy:0,w:28,h:28,gnd:false,got:false,type:'big'});SFX.shroom();}
    else if(blk.it==='S'){mushrooms.push({x:blk.x,y:blk.y-T,vx:2.5,vy:0,w:28,h:28,gnd:false,got:false,type:'star'});SFX.star();}
  }else if(blk.t==='B'){
    if(P.big||P.star){blk.t='AIR';blk.w=0;blk.h=0;spawnPart(blk.x+T/2,blk.y,'brick');addScore(50);}
    else{blk.bounce=8;SFX.bump();}
  }
}

// ═══ PLAYER UPDATE ═══
function updatePlayer(){
  if(P.dead){P.vy+=0.5;P.y+=P.vy;if(P.y>H+200)respawn();return;}
  if(P.grow>0){P.grow--;return;}
  if(P.star){P.starT--;if(P.starT<=0){P.star=false;}}
  if(P.inPipe){P.pipeT--;P.y+=P.pipeDir*2.5;if(P.pipeT<=0){P.inPipe=false;if(P.pipeDir>0&&!inSub){const pp=pipeObjs.find(p=>p.sec&&Math.abs(P.x-(p.x+T))<T*2);if(pp)enterSub(pp.x);}else if(P.pipeDir<0&&inSub)exitSub();}return;}
  if(P.onPole){if(poleObj)poleObj.flagY=Math.min(GY-T*2,poleObj.flagY+4);P.poleSpd=Math.min(P.poleSpd+0.25,5);P.y+=P.poleSpd;if(P.y>=GY-P.h-2){P.y=GY-P.h-2;P.onPole=false;P.vx=2.5;P.vy=0;P.dir=1;G.state='poleDone';G._pt=80;}return;}
  if(G.state==='poleDone'){G._pt--;P.x+=P.vx;P.vy+=0.5;P.y+=P.vy;if(P.y>=GY-P.h){P.y=GY-P.h;P.vy=0;}P.aT++;if(P.aT>6){P.aT=0;P.aF=(P.aF+1)%4;}if(G._pt<=0)nextLevel();return;}

  const sl=gS(true);
  const holdJ=keys.Space||keys.ArrowUp||keys.z||keys.x;
  if(P.vy<0&&holdJ&&P.jHeld)P.vy+=0.4;else P.vy+=0.8;
  P.jHeld=holdJ;if(P.vy>15)P.vy=15;

  const goL=keys.ArrowLeft||keys.a,goR=keys.ArrowRight||keys.d;
  const SPD=P.star?5.5:3.8;
  const fr=LEVELS[G.lv].theme==='snow'?0.93:0.80;
  if(goL){P.vx=Math.max(P.vx-0.55,-SPD);P.dir=-1;}
  else if(goR){P.vx=Math.min(P.vx+0.55,SPD);P.dir=1;}
  else{P.vx*=fr;if(Math.abs(P.vx)<0.12)P.vx=0;}

  if(P.gnd)P.coyote=8;else if(P.coyote>0)P.coyote--;
  if(jumpPressed){P.jBuf=12;jumpPressed=false;}
  if(P.jBuf>0)P.jBuf--;
  if(P.jBuf>0&&P.coyote>0){P.vy=P.big?-15:-13.5;P.jHeld=true;P.jBuf=0;P.coyote=0;SFX.jump();}

  moveX(P,sl);if(P.x<0)P.x=0;
  const LW=inSub?LEVELS[G.lv].sub.W:LEVELS[G.lv].LW;
  if(P.x>LW-P.w)P.x=LW-P.w;
  P.prevVy=P.vy;
  const{gnd,hitTop}=moveY(P,sl);P.gnd=gnd;if(gnd)P.coyote=8;
  if(hitTop)hitBlock(hitTop);
  (inSub?subQB:solids).forEach(b=>{if(b.bounce>0){b.bounce--;b.y=b.bY+(b.bounce>5?-4:0);}});
  if(P.y>H+80){P.dead=true;P.vy=-13;SFX.die();}
  if(P.invic>0)P.invic--;
  P.aT++;if(P.aT>5){P.aT=0;P.aF=(P.aF+1)%4;}

  // Pipe enter
  if(!inSub&&keys.ArrowDown&&P.gnd&&!P.inPipe){const pp=pipeObjs.find(p=>p.sec&&P.x+P.w>p.x+2&&P.x<p.x+p.w-2&&Math.abs((P.y+P.h)-p.y)<6);if(pp){P.inPipe=true;P.pipeDir=1;P.pipeT=22;SFX.pipe();}}
  if(inSub&&keys.ArrowDown&&P.gnd&&!P.inPipe){const ep=subSolids.find(s=>s.t==='PIPE_EX');if(ep&&P.x+P.w>ep.x+2&&P.x<ep.x+ep.w-2&&Math.abs((P.y+P.h)-ep.y)<6){P.inPipe=true;P.pipeDir=-1;P.pipeT=22;SFX.pipe();}}

  (inSub?subCoins:worldCoins).forEach(co=>{if(!co.got&&ov(P.x,P.y,P.w,P.h,co.x,co.y,co.w,co.h)){co.got=true;addCoin();addScore(200);SFX.coin();spawnPart(co.x+7,co.y,'coin');}});
  mushrooms.forEach(m=>{if(!m.got&&ov(P.x,P.y,P.w,P.h,m.x,m.y,m.w,m.h)){m.got=true;
    if(m.type==='big'){if(!P.big){P.big=true;P.h=48;P.y-=13;P.grow=20;}SFX.shroom();addScore(1000);spawnPart(m.x+14,m.y,'1up');}
    else if(m.type==='star'){P.star=true;P.starT=400;P.invic=400;SFX.star();addScore(500);spawnPart(m.x+14,m.y,'score100');}
  }});

  // Enemy collision
  enemies.forEach(e=>{
    if(e.dead||e.stomped)return;
    if(!ov(P.x,P.y,P.w,P.h,e.x,e.y,e.w,e.h))return;
    if(P.star){e.dead=true;addScore(200);SFX.stomp();spawnPart(e.x+15,e.y-2,'score100');return;}
    if(P.prevVy>0.5&&P.y+P.h<=e.y+e.h*0.55+4){
      if(e.type==='sp'){if(P.invic>0)return;if(P.big){P.big=false;P.h=35;P.y+=13;P.invic=100;SFX.hurt();}else{P.dead=true;P.vy=-13;SFX.die();}}
      else{e.stomped=true;e.stT=36;addScore(e.type==='k'?200:100);SFX.stomp();spawnPart(e.x+15,e.y-2,'score100');P.vy=-9;}
    }else{if(P.invic>0)return;if(P.big){P.big=false;P.h=35;P.y+=13;P.invic=100;SFX.hurt();}else{P.dead=true;P.vy=-13;SFX.die();}}
  });

  // Boss collision
  if(bossObj&&!bossObj.dead){
    if(ov(P.x,P.y,P.w,P.h,bossObj.x,bossObj.y,bossObj.w,bossObj.h)){
      if(P.star){bossObj.hp=0;bossObj.dead=true;SFX.boss();addScore(5000);}
      else if(P.prevVy>0.5&&P.y+P.h<=bossObj.y+20){
        bossObj.hp--;bossObj.hit=20;P.vy=-12;SFX.stomp();addScore(500);
        if(bossObj.hp<=0){bossObj.dead=true;SFX.boss();addScore(5000);}
      }else{if(P.invic>0)return;if(P.big){P.big=false;P.h=35;P.y+=13;P.invic=100;SFX.hurt();}else{P.dead=true;P.vy=-13;SFX.die();}}
    }
  }
  if(bossObj&&bossObj.dead&&bossObj.y>H){
    G.state='bossWin';G._bwt=200;SFX.victory();
  }

  // Flag
  if(!inSub&&G.state==='play'&&poleObj&&!P.onPole&&P.x+P.w>poleObj.x&&P.x<poleObj.x+10&&P.y<GY-T){P.onPole=true;P.x=poleObj.x-P.w+4;P.vy=0;P.vx=0;P.poleSpd=0;G.state='flagpole';SFX.flag();}
  if(inSub){subTimer++;if(subTimer>700)exitSub();}
}

function respawn(){G.lives--;if(G.lives<=0){G.state='over';stopBGM();return;}buildLevel(G.lv);initP();G.camX=0;G.timer=400;G.tTick=0;G.state='play';setTimeout(()=>startBGM(LEVELS[G.lv].theme),100);}
function nextLevel(){
  G.lv++;if(G.lv>=LEVELS.length){G.state='complete';stopBGM();SFX.victory();return;}
  const prev=LEVELS[G.lv-1],next=LEVELS[G.lv];
  if(prev.ep!==next.ep){G.state='epClear';G._epT=180;G._nEp=next.ep;stopBGM();SFX.clear();return;}
  buildLevel(G.lv);initP();G.camX=0;G.timer=400;G.tTick=0;G.state='play';setTimeout(()=>startBGM(LEVELS[G.lv].theme),100);
}
function contEp(){buildLevel(G.lv);initP();G.camX=0;G.timer=400;G.tTick=0;G.state='play';setTimeout(()=>startBGM(LEVELS[G.lv].theme),100);}

function updateEnemies(){
  const sl=gS(false);
  enemies.forEach(e=>{if(e.dead)return;if(e.stomped){e.stT--;if(e.stT<=0)e.dead=true;return;}if(e.x>G.camX+W+T*3)return;e.vy+=0.65;if(e.vy>12)e.vy=12;if(e.type==='fg'&&e.gnd){e.jumpT++;if(e.jumpT>80){e.vy=-7;e.jumpT=0;}}e.x+=e.vx;const hw=sl.find(s=>ov(e.x,e.y,e.w,e.h,s.x,s.y,s.w,s.h));if(hw){if(e.vx>0)e.x=hw.x-e.w;else e.x=hw.x+hw.w;e.vx=-e.vx;}e.y+=e.vy;let eg=false;for(const s of sl){if(!ov(e.x,e.y,e.w,e.h,s.x,s.y,s.w,s.h))continue;if(e.vy>=0){e.y=s.y-e.h;e.vy=0;eg=true;}break;}e.gnd=eg;if(eg&&e.type!=='fg'){const ex=e.x+(e.vx>0?e.w+2:-2);if(!sl.some(s=>ex>=s.x&&ex<s.x+s.w&&Math.abs((e.y+e.h)-s.y)<4))e.vx=-e.vx;}if(e.y>H+60)e.dead=true;e.aT++;if(e.aT>8){e.aT=0;e.aF=(e.aF+1)%2;}});
}
function updateBoss(){
  if(!bossObj||bossObj.dead){if(bossObj&&bossObj.dead){bossObj.vy+=0.5;bossObj.y+=bossObj.vy;}return;}
  const sl=gS(false);
  bossObj.vy+=0.5;if(bossObj.vy>10)bossObj.vy=10;
  bossObj.x+=bossObj.vx;
  const hw=sl.find(s=>ov(bossObj.x,bossObj.y,bossObj.w,bossObj.h,s.x,s.y,s.w,s.h));
  if(hw){if(bossObj.vx>0)bossObj.x=hw.x-bossObj.w;else bossObj.x=hw.x+hw.w;bossObj.vx=-bossObj.vx;}
  bossObj.y+=bossObj.vy;
  for(const s of sl){if(!ov(bossObj.x,bossObj.y,bossObj.w,bossObj.h,s.x,s.y,s.w,s.h))continue;if(bossObj.vy>=0){bossObj.y=s.y-bossObj.h;bossObj.vy=0;bossObj.gnd=true;}break;}
  if(bossObj.gnd){bossObj.aT++;if(bossObj.aT>60){bossObj.vy=-8;bossObj.aT=0;}}
  if(bossObj.hit>0)bossObj.hit--;
}
function updateMush(){const sl=gS(false);mushrooms.forEach(m=>{if(m.got)return;m.vy+=0.6;if(m.vy>12)m.vy=12;m.x+=m.vx;const hw=sl.find(s=>ov(m.x,m.y,m.w,m.h,s.x,s.y,s.w,s.h));if(hw){if(m.vx>0)m.x=hw.x-m.w;else m.x=hw.x+hw.w;m.vx=-m.vx;}m.y+=m.vy;for(const s of sl){if(!ov(m.x,m.y,m.w,m.h,s.x,s.y,s.w,s.h))continue;if(m.vy>=0){m.y=s.y-m.h;m.vy=0;}break;}});}

function spawnPart(x,y,t){if(t==='brick'){for(let i=0;i<4;i++)parts.push({x,y,t,vx:(i<2?1:-1)*(2+Math.random()*2),vy:-6-Math.random()*3,life:40});}else parts.push({x,y,t,vx:0,vy:-3.5,life:45});}
function updateParts(){parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.28;p.life--;return p.life>0;});}
function addScore(n){G.score+=n;}
function addCoin(){G.coins++;if(G.coins>=100){G.coins=0;G.lives++;SFX.oneup();}}
function updateCam(){if(inSub){G.camX=0;return;}G.camX=Math.max(G.camX,P.x-W*0.38);G.camX=Math.max(0,Math.min(G.camX,LEVELS[G.lv].LW-W));}

// ═══ DRAW FUNCTIONS ═══
function drawBG(){
  const th=gTH();const tid=inSub?'ug':LEVELS[G.lv].theme;
  if(tid==='sunset'){const g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#FF6B35');g.addColorStop(0.4,'#FF8C42');g.addColorStop(1,'#FFD700');X.fillStyle=g;X.fillRect(0,0,W,H);}
  else if(tid==='underwater'){const g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0A3060');g.addColorStop(1,'#061830');X.fillStyle=g;X.fillRect(0,0,W,H);}
  else if(tid==='candy'){const g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#FFB6C1');g.addColorStop(0.5,'#FFC0CB');g.addColorStop(1,'#FFE4E1');X.fillStyle=g;X.fillRect(0,0,W,H);}
  else if(tid==='toy'){const g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#FFE4B5');g.addColorStop(1,'#FFDAB9');X.fillStyle=g;X.fillRect(0,0,W,H);}
  else if(tid==='boss'){const g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0A0000');g.addColorStop(1,'#200800');X.fillStyle=g;X.fillRect(0,0,W,H);}
  else{X.fillStyle=th.sky;X.fillRect(0,0,W,H);}

  if(th.st){X.fillStyle='#FFF';for(let i=0;i<60;i++){X.globalAlpha=0.3+Math.sin(tNow/500+i)*0.5;X.fillRect((i*137+G.lv*100)%W,(i*173)%280,2,2);}X.globalAlpha=1;}
  if(th.cl){const cols=tid==='sunset'?'#FFF8E0':'#FFF';X.fillStyle=cols;[[200,55,28],[550,40,18],[950,52,28],[1500,44,18],[2100,58,28],[2700,46,18]].forEach(([cx2,cy2,r])=>{const sx=cx2-G.camX*0.26;if(sx>-150&&sx<W+150){X.beginPath();X.arc(sx+r,cy2,r,Math.PI,0);X.fill();X.beginPath();X.arc(sx+r*2.1,cy2-r*0.75,r*1.2,Math.PI,0);X.fill();X.beginPath();X.arc(sx+r*3.2,cy2,r,Math.PI,0);X.fill();X.fillRect(sx,cy2,r*4.2,r);}});}
  if(th.hl){const hC={desert:'#C8A060',snow:'#D0D8E0',night:'#1A3018',sunset:'#6B3410'}[tid]||'#00A800';X.fillStyle=hC;[[140,GY,72],[480,GY,44],[900,GY,72],[1550,GY,44]].forEach(([hx,hy,r])=>{const sx=hx-G.camX*0.48;if(sx>-120&&sx<W+120){X.beginPath();X.arc(sx,hy,r,Math.PI,0);X.closePath();X.fill();}});}
  if(th.tr){for(let i=0;i<10;i++){const tx=i*500+100-G.camX*0.35;if(tx>-100&&tx<W+100){X.fillStyle='#3A2010';X.fillRect(tx-5,GY-80,10,80);X.fillStyle='#1A4A10';X.beginPath();X.arc(tx,GY-80,35,0,Math.PI*2);X.fill();}}}
  if(th.wv){X.fillStyle='rgba(0,100,200,0.25)';const wt=tNow/1000;for(let x=0;x<W;x+=4){X.fillRect(x,GY+T/2+Math.sin(x/40+wt)*3,4,H);}}
  if(th.lv){const g=X.createLinearGradient(0,H-50,0,H);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,tid==='boss'?'rgba(255,40,0,0.4)':'rgba(255,60,0,0.3)');X.fillStyle=g;X.fillRect(0,H-50,W,50);}
  if(th.bs){// Lava pool animation
    X.fillStyle='rgba(255,100,0,0.6)';
    for(let x=0;x<W;x+=20){const ly=H-10+Math.sin(x/30+tNow/300)*5;X.fillRect(x,ly,20,H-ly);}
  }

  // Env particles
  envP.forEach(ep=>{

  });

}

function drawMario(sx,sy){
  if(P.invic>0&&!P.star&&Math.floor(P.invic/4)%2===0)return;
  const flip=P.dir<0;
  const f=P.aF%4;const inAir=!P.gnd&&!P.onPole;
  const white=P.star;
  // Star glow (enhanced rainbow pulse)
  if(P.star){
    const t=tNow/80;
    const r2=P.w*1.3+Math.sin(t)*4;
    const hue=(tNow/4)%360;
    const glow=X.createRadialGradient(sx+P.w/2,sy+P.h/2,3,sx+P.w/2,sy+P.h/2,r2);
    glow.addColorStop(0,`hsla(${hue},100%,85%,0.35)`);
    glow.addColorStop(0.5,`hsla(${hue+60},100%,70%,0.15)`);
    glow.addColorStop(1,`hsla(${hue},100%,50%,0)`);
    X.fillStyle=glow;X.beginPath();X.arc(sx+P.w/2,sy+P.h/2,r2,0,Math.PI*2);X.fill();
    // Star sparkle particles
    for(let i=0;i<4;i++){
      const a=tNow/200+i*Math.PI/2;
      const dist=P.w*0.7+Math.sin(tNow/150+i)*6;
      const spx=sx+P.w/2+Math.cos(a)*dist;
      const spy=sy+P.h/2+Math.sin(a)*dist;
      X.fillStyle=`hsla(${(hue+i*90)%360},100%,90%,${0.5+Math.sin(tNow/100+i)*0.3})`;
      X.fillRect(spx-1,spy-1,3,3);
    }
  }
  // Select sprite - use separate white mario sprites for star power
  let sprite;
  if(white){
    if(inAir)sprite=MWJ;
    else if(Math.abs(P.vx)<0.3)sprite=MWS;
    else sprite=f%2===0?MWR1:MWR2;
  }else{
    if(inAir)sprite=MJ;
    else if(Math.abs(P.vx)<0.3)sprite=MS;
    else sprite=f%2===0?MR1:MR2;
  }
  // Main sprite with 3D pixel rendering
  drawPM(sx,sy,sprite,P.w,P.h,flip,white);
  // Subtle specular highlight on top of character
  X.globalAlpha=0.08;X.fillStyle='#FFF';
  X.fillRect(flip?sx+P.w*0.35:sx+P.w*0.2,sy+1,P.w*0.3,P.h*0.18);
  X.globalAlpha=1;
}

// ═══ INPUT (FIXED: proper key state management) ═══
const keys={};let jumpPressed=false;
// Reset all keys on visibility change to fix stuck keys
document.addEventListener('visibilitychange',()=>{if(document.hidden){for(const k in keys)keys[k]=false;jumpPressed=false;}});
window.addEventListener('blur',()=>{for(const k in keys)keys[k]=false;jumpPressed=false;});

document.addEventListener('keydown',e=>{
  if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyZ','KeyX','KeyA','KeyD'].includes(e.code))e.preventDefault();
  keys[e.code]=true;
  if('Space ArrowUp KeyZ KeyX'.split(' ').includes(e.code)){jumpPressed=true;keys.Space=true;}
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.ArrowLeft=true;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.ArrowRight=true;
  if(e.code==='ArrowDown')keys.ArrowDown=true;
  keys.z=!!keys.KeyZ;keys.x=!!keys.KeyX;keys.a=!!keys.KeyA;keys.d=!!keys.KeyD;
  uAC();handleInput();
});
document.addEventListener('keyup',e=>{
  keys[e.code]=false;
  if(e.code==='Space')keys.Space=false;
  if(e.code==='ArrowUp')keys.ArrowUp=false;
  if(e.code==='ArrowLeft'||e.code==='KeyA'){keys.ArrowLeft=!!keys.KeyA||!!keys.ArrowLeft;}
  if(e.code==='ArrowRight'||e.code==='KeyD'){keys.ArrowRight=!!keys.KeyD||!!keys.ArrowRight;}
  keys.z=!!keys.KeyZ;keys.x=!!keys.KeyX;keys.a=!!keys.KeyA;keys.d=!!keys.KeyD;
  // Re-check compound keys
  keys.ArrowLeft=!!(keys.ArrowLeft||keys.KeyA);
  keys.ArrowRight=!!(keys.ArrowRight||keys.KeyD);
});

function handleInput(){
  if(G.state==='title')startGame();
  else if(G.state==='over'||G.state==='complete'){G.state='title';G.lv=0;stopBGM();}
}

function setupMobile(){
  function btn(id,code,isJ){
    const el=document.getElementById(id);
    const dn=e=>{e.preventDefault();keys[code]=true;if(isJ){jumpPressed=true;keys.Space=true;}el.classList.add('act');uAC();handleInput();};
    const up=e=>{e.preventDefault();keys[code]=false;if(isJ)keys.Space=false;el.classList.remove('act');};
    ['touchstart'].forEach(ev=>el.addEventListener(ev,dn,{passive:false}));
    ['touchend','touchcancel'].forEach(ev=>el.addEventListener(ev,up,{passive:false}));
    el.addEventListener('mousedown',dn);el.addEventListener('mouseup',up);el.addEventListener('mouseleave',up);
  }
  btn('bl','ArrowLeft',false);btn('br','ArrowRight',false);btn('bd','ArrowDown',false);btn('bj','Space',true);
}

function startGame(){
  G={state:'play',lv:0,score:0,lives:5,coins:0,timer:400,tTick:0,camX:0};
  LEVELS=mkLevels();buildLevel(0);initP();
  // Reset all keys on game start
  for(const k in keys)keys[k]=false;jumpPressed=false;
  startBGM(LEVELS[0].theme);
}

// ═══ MAIN LOOP ═══
let lt=0;
function loop(ts){
  requestAnimationFrame(loop);if(ts-lt<1000/62)return;lt=ts;tNow=ts;
  if(G.state==='play'||G.state==='sub'){G.tTick++;if(G.tTick>=42){G.tTick=0;G.timer=Math.max(0,G.timer-1);}if(G.timer<=0&&!P.dead){P.dead=true;P.vy=-13;SFX.die();}}
  if(G.state==='epClear'){G._epT--;if(G._epT<=0)contEp();}
  if(G.state==='bossWin'){G._bwt--;if(G._bwt<=0){G.state='complete';SFX.victory();}}
  const active='play sub flagpole poleDone'.split(' ').includes(G.state);
  if(active){updatePlayer();if(G.state==='play'||G.state==='sub'){updateEnemies();updateBoss();updateMush();}updateParts();updateCam();}
  X.clearRect(0,0,W,H);
  if(G.state==='title')drawTitle();
  else if(G.state==='over')drawOver();
  else if(G.state==='complete')drawComplete();
  else if(G.state==='epClear')drawEpClear();
  else if(G.state==='bossWin')drawBossWin();
  else drawAll();
}
setupMobile();requestAnimationFrame(loop);
</script>
